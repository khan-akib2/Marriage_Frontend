<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B1C1C"/>
      <stop offset="100%" style="stop-color:#421010"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DFB76C"/>
      <stop offset="50%" style="stop-color:#C5A059"/>
      <stop offset="100%" style="stop-color:#AB8A44"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#ring)" stroke-width="6"/>
  <!-- Inner dashed ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#DFB76C" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
  <!-- Letter G -->
  <text x="256" y="290" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="220" font-weight="300" fill="#DFB76C" letter-spacing="-5">G</text>
</svg>
